<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte Técnico - Integración SOA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 30px; }
        .dashboard { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .section { border-bottom: 1px solid #eee; padding: 15px 0; }
        .user-card { padding: 10px; margin: 10px 0; border-radius: 5px; border-left: 5px solid #ccc; }
        .cercano { border-left-color: #28a745; background-color: #e6ffed; }
        .remoto { border-left-color: #007bff; background-color: #f0f7ff; }
        .badge { font-size: 0.8em; padding: 3px 8px; border-radius: 10px; color: white; }
        .bg-success { background: #28a745; }
        .bg-primary { background: #007bff; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Centro de Servicios IT</h1>
        
        <div class="section" id="geo-info">
            <h3>📍 Tu Ubicación</h3>
            <p id="out-geo">Obteniendo coordenadas...</p>
        </div>

        <div class="section">
            <h3>👥 Personal Disponible</h3>
            <div id="out-users">Esperando ubicación para filtrar personal...</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
